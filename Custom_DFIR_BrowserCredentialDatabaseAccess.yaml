name: Custom.DFIR.BrowserCredentialDatabaseAccess
author: Yaniv Radunsky @ tenroot & Hohit (AI)
description: |
  Hunts for browser credential databases (Chrome, Edge, Firefox SQLite files) on Windows endpoints.
  
  Browsers store saved passwords in SQLite databases at well-known user-profile paths.
  Adversaries (T1555.003) target these files to extract cleartext or encrypted credentials.
  This artifact locates Login Data (Chromium-based) and logins.json / key4.db (Firefox),
  collects file metadata, hashes, and optionally uploads the files for offline analysis.

reference:
  - https://attack.mitre.org/techniques/T1555.003/
  - https://www.netspi.com/blog/technical/network-penetration-testing/stealing-saved-credentials-from-chrome-and-firefox/

type: CLIENT

parameters:
  - name: ChromeGlob
    type: glob
    default: "C:/Users/*/AppData/Local/Google/Chrome/User Data/*/Login Data"
    description: Glob for Chrome credential databases
  - name: EdgeGlob
    type: glob
    default: "C:/Users/*/AppData/Local/Microsoft/Edge/User Data/*/Login Data"
    description: Glob for Edge credential databases
  - name: FirefoxGlob
    type: glob
    default: "C:/Users/*/AppData/Roaming/Mozilla/Firefox/Profiles/*/{logins.json,key4.db,signons.sqlite}"
    description: Glob for Firefox credential files
  - name: FilterRegex
    type: regex
    default: "."
    description: Regex filter applied to OSPath
  - name: UploadFiles
    type: bool
    default: "N"
    description: Upload matched credential files for offline analysis

sources:
  - name: ChromeCredentialDatabases
    description: Locate Chrome Login Data SQLite files and collect metadata/hashes
    query: |
      LET ChromeFiles <= SELECT OSPath, Size, Mtime, Atime, Ctime
        FROM glob(globs=ChromeGlob)
        WHERE OSPath =~ FilterRegex

      SELECT
        OSPath,
        Size,
        Mtime,
        Atime,
        Ctime,
        hash(path=OSPath, hashselect="MD5,SHA256") AS Hashes,
        if(condition=UploadFiles,
           then=upload(file=OSPath),
           else=NULL) AS Upload
      FROM ChromeFiles

  - name: EdgeCredentialDatabases
    description: Locate Edge Login Data SQLite files and collect metadata/hashes
    query: |
      LET EdgeFiles <= SELECT OSPath, Size, Mtime, Atime, Ctime
        FROM glob(globs=EdgeGlob)
        WHERE OSPath =~ FilterRegex

      SELECT
        OSPath,
        Size,
        Mtime,
        Atime,
        Ctime,
        hash(path=OSPath, hashselect="MD5,SHA256") AS Hashes,
        if(condition=UploadFiles,
           then=upload(file=OSPath),
           else=NULL) AS Upload
      FROM EdgeFiles

  - name: FirefoxCredentialFiles
    description: Locate Firefox logins.json, key4.db, and signons.sqlite files
    query: |
      LET FirefoxFiles <= SELECT OSPath, Size, Mtime, Atime, Ctime
        FROM glob(globs=FirefoxGlob)
        WHERE OSPath =~ FilterRegex

      SELECT
        OSPath,
        Size,
        Mtime,
        Atime,
        Ctime,
        hash(path=OSPath, hashselect="MD5,SHA256") AS Hashes,
        if(condition=UploadFiles,
           then=upload(file=OSPath),
           else=NULL) AS Upload
      FROM FirefoxFiles

  - name: RecentAccessSummary
    description: Combine all browser credential file hits into a unified summary
    query: |
      LET AllBrowserFiles <= SELECT OSPath, Size, Mtime, Atime, Ctime
        FROM glob(globs=[ChromeGlob, EdgeGlob, FirefoxGlob])
        WHERE OSPath =~ FilterRegex

      SELECT
        OSPath,
        Size,
        Mtime,
        Atime,
        Ctime
      FROM AllBrowserFiles

column_types:
  - name: Mtime
    type: timestamp
  - name: Atime
    type: timestamp
  - name: Ctime
    type: timestamp
