name: Custom.DFIR.LsassCredentialDumpingSysmon
author: Yaniv Radunsky @ tenroot & Hohit (AI)
description: |
  Detects evidence of credential dumping via LSASS memory access using Sysmon Event ID 10 (ProcessAccess).

  Attackers targeting lsass.exe (e.g., Mimikatz, ProcDump, Task Manager dump) request
  specific memory access rights to read LSASS process memory and extract credentials.
  This artifact parses Sysmon operational logs for suspicious cross-process memory access
  targeting lsass.exe, filtering by known-malicious access masks and caller process names.

  MITRE ATT&CK: T1003.001 - OS Credential Dumping: LSASS Memory

reference:
  - https://attack.mitre.org/techniques/T1003.001/
  - https://docs.microsoft.com/en-us/sysinternals/downloads/sysmon
  - https://github.com/SwiftOnSecurity/sysmon-config

type: CLIENT

parameters:
  - name: SysmonEvtxGlob
    type: glob
    default: "C:/Windows/System32/winevt/Logs/Microsoft-Windows-Sysmon%4Operational.evtx"
    description: Path glob to Sysmon Operational EVTX log

  - name: TargetProcessRegex
    type: regex
    default: "(?i)lsass\\.exe"
    description: Regex to match target process (default lsass.exe)

  - name: CallerProcessFilter
    type: regex
    default: "."
    description: Optional regex filter on calling process name (e.g. mimikatz|procdump)

  - name: SuspiciousAccessMasks
    type: string
    default: "0x1010|0x1410|0x1fffff|0x143a|0x1438|0x40|0x1000|0x1f0fff|0x1f1fff"
    description: Pipe-separated known-malicious access mask values to flag

  - name: DateAfter
    type: string
    default: ""
    description: Only show events after this ISO timestamp (e.g. 2026-01-01T00:00:00Z). Leave blank for all.

  - name: UploadEvtx
    type: bool
    default: false
    description: Upload the Sysmon EVTX file as evidence

sources:
  - name: LsassAccessEvents
    description: Sysmon Event ID 10 - ProcessAccess events targeting lsass.exe
    query: |
      LET evtx_files <= SELECT OSPath FROM glob(globs=SysmonEvtxGlob)

      LET raw_events <= SELECT * FROM foreach(
        row={ SELECT OSPath FROM evtx_files },
        query={
          SELECT
            System.TimeCreated.SystemTime AS EventTime,
            System.EventID.Value AS EventID,
            System.Computer AS Hostname,
            EventData.SourceProcessGUID AS SourceGUID,
            EventData.SourceProcessId AS SourcePID,
            EventData.SourceThreadId AS SourceTID,
            EventData.SourceImage AS CallerProcess,
            EventData.TargetProcessGUID AS TargetGUID,
            EventData.TargetProcessId AS TargetPID,
            EventData.TargetImage AS TargetProcess,
            EventData.GrantedAccess AS GrantedAccess,
            EventData.CallTrace AS CallTrace,
            OSPath AS EvtxSource
          FROM parse_evtx(filename=OSPath)
          WHERE System.EventID.Value = 10
        })

      LET filtered <= SELECT * FROM raw_events
        WHERE TargetProcess =~ TargetProcessRegex
          AND CallerProcess =~ CallerProcessFilter
          AND (DateAfter = "" OR EventTime > DateAfter)

      LET flagged <= SELECT
        EventTime,
        EventID,
        Hostname,
        CallerProcess,
        SourcePID,
        SourceTID,
        TargetProcess,
        TargetPID,
        GrantedAccess,
        if(condition=GrantedAccess =~ SuspiciousAccessMasks,
           then="⚠️ SUSPICIOUS",
           else="INFO") AS Severity,
        CallTrace,
        EvtxSource
      FROM filtered

      SELECT * FROM flagged ORDER BY EventTime DESC

  - name: SuspiciousOnly
    description: Only events with known-malicious access masks
    query: |
      LET evtx_files2 <= SELECT OSPath FROM glob(globs=SysmonEvtxGlob)

      LET all_access <= SELECT * FROM foreach(
        row={ SELECT OSPath FROM evtx_files2 },
        query={
          SELECT
            System.TimeCreated.SystemTime AS EventTime,
            System.EventID.Value AS EventID,
            System.Computer AS Hostname,
            EventData.SourceProcessId AS SourcePID,
            EventData.SourceImage AS CallerProcess,
            EventData.TargetProcessId AS TargetPID,
            EventData.TargetImage AS TargetProcess,
            EventData.GrantedAccess AS GrantedAccess,
            EventData.CallTrace AS CallTrace,
            OSPath AS EvtxSource
          FROM parse_evtx(filename=OSPath)
          WHERE System.EventID.Value = 10
            AND EventData.TargetImage =~ "(?i)lsass\\.exe"
        })

      SELECT
        EventTime,
        Hostname,
        CallerProcess,
        SourcePID,
        TargetProcess,
        TargetPID,
        GrantedAccess,
        CallTrace,
        EvtxSource
      FROM all_access
      WHERE GrantedAccess =~ SuspiciousAccessMasks
      ORDER BY EventTime DESC

  - name: CallerProcessSummary
    description: Aggregated summary of processes that accessed LSASS
    query: |
      LET evtx_files3 <= SELECT OSPath FROM glob(globs=SysmonEvtxGlob)

      LET lsass_access <= SELECT * FROM foreach(
        row={ SELECT OSPath FROM evtx_files3 },
        query={
          SELECT
            EventData.SourceImage AS CallerProcess,
            EventData.GrantedAccess AS GrantedAccess
          FROM parse_evtx(filename=OSPath)
          WHERE System.EventID.Value = 10
            AND EventData.TargetImage =~ "(?i)lsass\\.exe"
        })

      SELECT
        CallerProcess,
        GrantedAccess,
        count() AS EventCount
      FROM lsass_access
      GROUP BY CallerProcess, GrantedAccess
      ORDER BY EventCount DESC

  - name: EvtxUpload
    description: Upload Sysmon EVTX for offline analysis (only if UploadEvtx=true)
    query: |
      SELECT * FROM if(
        condition=UploadEvtx,
        then={
          SELECT OSPath, upload(file=OSPath) AS Upload
          FROM glob(globs=SysmonEvtxGlob)
        },
        else={
          SELECT "Upload disabled — set UploadEvtx=true to collect" AS Note
          FROM scope()
        })

column_types:
  - name: EventTime
    type: timestamp
  - name: CallerProcess
    type: preview_url
  - name: TargetProcess
    type: preview_url
  - name: EvtxSource
    type: preview_url
  - name: CallTrace
    type: nobreak
